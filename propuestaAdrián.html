<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPrint Home - Editor de Plato</title>
    <!-- Incluimos Tailwind CSS para un diseño moderno, rápido y responsive sin necesidad de un archivo CSS extra -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos CSS adicionales para la animación de impresión */
        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
            display: none; /* Oculto por defecto */
        }
        .progress-bar-fill {
            height: 100%;
            background-color: #3b82f6; /* Azul tecnológico */
            width: 0%;
            transition: width 0.1s linear;
        }
        /* Animación de pulso para simular que está "trabajando" */
        .printing-pulse {
            animation: pulse-shadow 1.5s infinite;
        }
        @keyframes pulse-shadow {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans selection:bg-blue-200">

    <!-- Contenedor principal de la aplicación -->
    <div class="max-w-5xl mx-auto p-4 md:p-8">
        
        <!-- Encabezado -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-teal-500 mb-2">
                NutriPrint Home
            </h1>
            <p class="text-lg text-slate-500">Diseña tu comida personalizada para impresión 3D</p>
        </header>

        <!-- Área de la interfaz: Controles (Izquierda) y Canvas (Derecha) -->
        <div class="flex flex-col md:flex-row gap-8">
            
            <!-- PANEL IZQUIERDO: Controles del editor -->
            <div class="flex-1 bg-white p-6 rounded-2xl shadow-lg border border-slate-100">
                <h2 class="text-xl font-bold mb-6 text-slate-700 border-b pb-2">Ajustes de Ingredientes</h2>
                
                <!-- Control: Proteína -->
                <div class="mb-5">
                    <label class="block text-sm font-semibold mb-1 text-red-600">Proteína</label>
                    <div class="flex gap-2 mb-2">
                        <!-- Selector del tipo de ingrediente que cambiará el color en el plato -->
                        <select id="proteinType" class="flex-1 rounded-md border-slate-300 bg-slate-50 p-2 text-sm focus:ring-blue-500 focus:border-blue-500 border outline-none">
                            <option value="#f87171">Salmón Sintético</option>
                            <option value="#b91c1c">Ternera Celular</option>
                            <option value="#fde047">Tofu Texturizado</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="range" id="proteinAmount" min="0" max="100" value="30" class="w-full accent-red-500">
                        <span id="proteinLabel" class="text-sm font-medium w-12 text-right">30%</span>
                    </div>
                </div>

                <!-- Control: Verduras -->
                <div class="mb-5">
                    <label class="block text-sm font-semibold mb-1 text-green-600">Verduras</label>
                    <div class="flex gap-2 mb-2">
                        <select id="veggieType" class="flex-1 rounded-md border-slate-300 bg-slate-50 p-2 text-sm focus:ring-blue-500 focus:border-blue-500 border outline-none">
                            <option value="#4ade80">Brócoli en polvo</option>
                            <option value="#fb923c">Crema de Zanahoria</option>
                            <option value="#15803d">Espinaca Líquida</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="range" id="veggieAmount" min="0" max="100" value="40" class="w-full accent-green-500">
                        <span id="veggieLabel" class="text-sm font-medium w-12 text-right">40%</span>
                    </div>
                </div>

                <!-- Control: Carbohidratos -->
                <div class="mb-6">
                    <label class="block text-sm font-semibold mb-1 text-yellow-600">Carbohidratos</label>
                    <div class="flex gap-2 mb-2">
                        <select id="carbType" class="flex-1 rounded-md border-slate-300 bg-slate-50 p-2 text-sm focus:ring-blue-500 focus:border-blue-500 border outline-none">
                            <option value="#fef08a">Pasta 3D</option>
                            <option value="#e2e8f0">Arroz Base</option>
                            <option value="#d97706">Puré de Patata</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-4">
                        <input type="range" id="carbAmount" min="0" max="100" value="30" class="w-full accent-yellow-500">
                        <span id="carbLabel" class="text-sm font-medium w-12 text-right">30%</span>
                    </div>
                </div>

                <!-- Control: Calorías totales (Afecta el tamaño de la porción en el plato) -->
                <div class="mb-2 pt-4 border-t">
                    <label class="block text-sm font-semibold mb-2 text-slate-700">Calorías Totales: <span id="calLabel" class="text-blue-600 font-bold">600 kcal</span></label>
                    <input type="range" id="caloriesAmount" min="200" max="1200" value="600" step="50" class="w-full accent-blue-600">
                    <p class="text-xs text-slate-400 mt-1">Ajusta el tamaño de la ración a imprimir.</p>
                </div>
            </div>

            <!-- PANEL DERECHO: Canvas de visualización y botón de imprimir -->
            <div class="flex-1 bg-white p-6 rounded-2xl shadow-lg border border-slate-100 flex flex-col items-center justify-between">
                
                <div class="w-full text-center mb-4">
                    <h2 class="text-xl font-bold text-slate-700">Vista Previa del Plato</h2>
                </div>

                <!-- Canvas HTML5 donde dibujaremos el plato interactivamente -->
                <div class="relative flex justify-center items-center w-full my-auto">
                    <!-- Sombra decorativa detrás del plato -->
                    <div class="absolute w-64 h-64 bg-slate-200 rounded-full blur-md opacity-50 top-4"></div>
                    <canvas id="plateCanvas" width="300" height="300" class="relative z-10 rounded-full transition-transform duration-300"></canvas>
                </div>

                <!-- Controles de Impresión -->
                <div class="w-full mt-8 text-center">
                    <button id="printBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all duration-200 transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed">
                        🖨️ Imprimir Plato
                    </button>
                    
                    <!-- Mensaje de estado y barra de progreso (Ocultos inicialmente) -->
                    <p id="statusMessage" class="text-sm font-semibold text-blue-600 mt-3 h-5 opacity-0 transition-opacity">
                        Enviando a la impresora de alimentos...
                    </p>
                    <div id="progressBar" class="progress-bar-container">
                        <div id="progressFill" class="progress-bar-fill"></div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- CÓDIGO JAVASCRIPT: Lógica interactiva -->
    <script>
        // 1. Obtener referencias a los elementos del DOM (HTML)
        const canvas = document.getElementById('plateCanvas');
        const ctx = canvas.getContext('2d'); // Contexto 2D para dibujar

        // Inputs de cantidad (sliders)
        const proteinInput = document.getElementById('proteinAmount');
        const veggieInput = document.getElementById('veggieAmount');
        const carbInput = document.getElementById('carbAmount');
        const caloriesInput = document.getElementById('caloriesAmount');

        // Inputs de tipo (selectores de color)
        const proteinType = document.getElementById('proteinType');
        const veggieType = document.getElementById('veggieType');
        const carbType = document.getElementById('carbType');

        // Etiquetas de texto
        const proteinLabel = document.getElementById('proteinLabel');
        const veggieLabel = document.getElementById('veggieLabel');
        const carbLabel = document.getElementById('carbLabel');
        const calLabel = document.getElementById('calLabel');

        // Elementos de impresión
        const printBtn = document.getElementById('printBtn');
        const statusMessage = document.getElementById('statusMessage');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // 2. Función principal para dibujar el plato en el Canvas
        function drawPlate() {
            // Leer los valores actuales de los sliders (cantidades)
            let pAmount = parseInt(proteinInput.value);
            let vAmount = parseInt(veggieInput.value);
            let cAmount = parseInt(carbInput.value);
            const calories = parseInt(caloriesInput.value);

            // Actualizar los textos de la interfaz
            proteinLabel.innerText = pAmount + '%';
            veggieLabel.innerText = vAmount + '%';
            carbLabel.innerText = cAmount + '%';
            calLabel.innerText = calories + ' kcal';

            // Leer los colores seleccionados
            const pColor = proteinType.value;
            const vColor = veggieType.value;
            const cColor = carbType.value;

            // Calcular el total para saber las proporciones
            const total = pAmount + vAmount + cAmount;

            // Limpiar el canvas para volver a dibujar
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Dibujar la base del plato (Blanco con borde gris)
            ctx.beginPath();
            ctx.arc(centerX, centerY, 140, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#e2e8f0';
            ctx.stroke();

            // Dibujar un círculo interior para dar profundidad al plato
            ctx.beginPath();
            ctx.arc(centerX, centerY, 110, 0, 2 * Math.PI);
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Si todos los valores están en 0, no dibujamos comida
            if (total === 0) return;

            // Calcular el radio de la comida basado en las calorías (de 200 a 1200 kcal)
            // Radio base = 50, Radio máximo = 120
            const foodRadius = 50 + ((calories - 200) / 1000) * 70;

            // Ángulo inicial para empezar a dibujar (Arriba en el centro)
            let currentAngle = -0.5 * Math.PI;

            // Función interna para dibujar un trozo (sección del plato)
            function drawFoodSlice(amount, color) {
                if (amount === 0) return;
                // Calculamos el ángulo en radianes proporcional a la cantidad
                const sliceAngle = (amount / total) * (2 * Math.PI);
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                // Dibujamos el arco desde el ángulo actual hasta el ángulo final de esta sección
                ctx.arc(centerX, centerY, foodRadius, currentAngle, currentAngle + sliceAngle);
                ctx.closePath();
                
                // Rellenar con color
                ctx.fillStyle = color;
                ctx.fill();
                
                // Añadir un borde sutil para separar ingredientes
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                // Actualizar el ángulo para el siguiente ingrediente
                currentAngle += sliceAngle;
            }

            // Dibujamos cada porción de ingrediente
            drawFoodSlice(pAmount, pColor);
            drawFoodSlice(vAmount, vColor);
            drawFoodSlice(cAmount, cColor);
        }

        // 3. Añadir "Event Listeners" para detectar cuando el usuario interactúa
        const inputs = [proteinInput, veggieInput, carbInput, caloriesInput, proteinType, veggieType, carbType];
        
        // Cada vez que un control cambia, redibujamos el plato
        inputs.forEach(input => {
            input.addEventListener('input', drawPlate);
        });

        // 4. Lógica de la simulación de impresión
        printBtn.addEventListener('click', () => {
            // Deshabilitar el botón y mostrar estado
            printBtn.disabled = true;
            printBtn.innerText = "Imprimiendo...";
            canvas.classList.add('printing-pulse'); // Añade clase de animación CSS
            
            statusMessage.style.opacity = 1;
            statusMessage.innerText = "Enviando a la impresora de alimentos...";
            progressBar.style.display = 'block';
            
            let progress = 0;
            
            // Simular el proceso con un intervalo que actualiza la barra
            const interval = setInterval(() => {
                progress += 5; // Aumentar progreso
                progressFill.style.width = progress + '%';
                
                // Mensajes dinámicos según el progreso
                if (progress === 30) statusMessage.innerText = "Calentando extrusores...";
                if (progress === 60) statusMessage.innerText = "Imprimiendo capas base...";
                if (progress === 90) statusMessage.innerText = "Añadiendo texturas finales...";

                // Al llegar al 100% terminar el proceso
                if (progress >= 100) {
                    clearInterval(interval);
                    statusMessage.innerText = "¡Plato listo! 🍽️";
                    statusMessage.classList.replace('text-blue-600', 'text-green-600');
                    canvas.classList.remove('printing-pulse');
                    
                    // Restaurar la interfaz después de 3 segundos
                    setTimeout(() => {
                        printBtn.disabled = false;
                        printBtn.innerText = "🖨️ Imprimir Plato";
                        progressBar.style.display = 'none';
                        progressFill.style.width = '0%';
                        statusMessage.style.opacity = 0;
                        statusMessage.classList.replace('text-green-600', 'text-blue-600');
                    }, 3000);
                }
            }, 150); // El intervalo se ejecuta cada 150 milisegundos
        });

        // 5. Dibujo inicial al cargar la página
        drawPlate();

    </script>
</body>
</html>
